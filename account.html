<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Antares — your Pro / Lifetime licenses, with the email + password you signed up with.">
<meta name="robots" content="noindex,nofollow">
<link rel="canonical" href="https://antares-website.vercel.app/account">
<title>Account — Antares</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--c:#00e5b0;--bg:#0a0a0c;--card:#111114;--border:#1a1a1e;--dim:#3a3a3f;--txt:#c8c8cc;--red:#ff5f5f;--purple:#a78bfa;--yellow:#f5d000}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Mono',monospace;min-height:100vh;display:flex;flex-direction:column}
.stripe{position:fixed;top:0;left:0;right:0;height:3px;z-index:999;background:linear-gradient(90deg,#c0007a,var(--c),#c8c000,#c0002a,var(--c),#c0007a);background-size:400% 100%;animation:stripe 6s linear infinite;opacity:.7}
@keyframes stripe{0%{background-position:0% 0}100%{background-position:400% 0}}
.shell{position:relative;z-index:2;max-width:780px;margin:0 auto;padding:0 32px;flex:1;width:100%}
nav{display:flex;justify-content:space-between;align-items:center;padding:22px 0;position:sticky;top:3px;z-index:100;background:rgba(10,10,12,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
nav .brand{font:400 30px/1 'Bebas Neue',sans-serif;letter-spacing:.18em;color:#e0e0e0;text-decoration:none;display:flex;align-items:center;gap:10px}
nav .brand img{height:38px;width:auto}
nav .links{display:flex;gap:14px;align-items:center}
nav .links a{font-size:11px;color:#454550;text-decoration:none;letter-spacing:.1em;text-transform:uppercase}
nav .links a:hover{color:var(--c)}
.skip-link{position:absolute;top:-100%;left:0;background:var(--c);color:#0f0f11;padding:8px 16px;z-index:10000;font-size:12px;text-decoration:none}
.skip-link:focus{top:0}

main{padding:50px 0 80px}
.head-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:36px;flex-wrap:wrap;gap:18px}
h1{font:400 56px/1 'Bebas Neue',sans-serif;letter-spacing:.04em;color:#eaeaea}
h1 span{color:var(--c)}
.account-meta{font-size:11px;color:#666;letter-spacing:.04em;line-height:1.7;text-align:right}
.account-meta b{color:#9a9aa2;font-weight:600}
.logout-btn{margin-top:6px;background:none;border:1px solid var(--border);color:#888;padding:7px 14px;font:600 10px/1 'IBM Plex Mono',monospace;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:.2s}
.logout-btn:hover{color:#ff7777;border-color:rgba(255,95,95,.4)}

.section-label{font-size:10px;color:#5a5a62;letter-spacing:.22em;text-transform:uppercase;margin:24px 0 14px;text-align:center}

/* ── Tier banner — big, at-a-glance "you are PRO/LIFETIME/FREE" indicator
   that lands directly under the page heading. The whole point of the
   account page is to answer the user's first question on arrival —
   "what tier am I?" — so we lead with that, not buried in the licence
   list below. Tier color, expiry/forever badge, and a one-line
   "what does this mean?" tooltip beneath. */
.tier-banner{display:flex;align-items:center;gap:18px;padding:24px 28px;border-radius:4px;margin:28px 0 12px;border:1px solid;background:var(--card);position:relative;overflow:hidden}
.tier-banner::before{content:'';position:absolute;inset:0;opacity:.04;pointer-events:none;background:radial-gradient(circle at 0% 50%,currentColor,transparent 60%)}
.tier-banner.free{border-color:#2a2a30;color:#888}
.tier-banner.pro{border-color:rgba(0,229,176,.5);color:var(--c);box-shadow:0 0 0 1px rgba(0,229,176,.1),0 12px 32px rgba(0,229,176,.06)}
.tier-banner.lifetime{border-color:rgba(167,139,250,.5);color:var(--purple);box-shadow:0 0 0 1px rgba(167,139,250,.1),0 12px 32px rgba(167,139,250,.06)}
.tier-banner-label{font:600 10px/1 'IBM Plex Mono',monospace;letter-spacing:.28em;text-transform:uppercase;color:#5a5a62;margin-bottom:6px}
.tier-banner-name{font:400 44px/.95 'Bebas Neue',sans-serif;letter-spacing:.06em;color:currentColor;margin-bottom:6px}
.tier-banner-detail{font-size:11.5px;color:#9a9aa2;letter-spacing:.04em;line-height:1.6}
.tier-banner-detail b{color:#cccccc;font-weight:600}
.tier-banner-meta{margin-left:auto;text-align:right;font-size:10px;color:#5a5a62;letter-spacing:.04em;line-height:1.7;flex-shrink:0}
.tier-banner-meta b{color:#9a9aa2;font-weight:600;font-size:11px}

/* ── Activate-in-extension callout — the missing UX bridge between
   "I have a license key" and "my extension knows I'm Pro". Without
   this, users sit on the page wondering why their browser overlay
   still says Free. Step-by-step + a Copy button on the relevant
   key keeps the friction low. */
.activate-callout{margin:18px 0 12px;padding:18px 22px;border:1px dashed #2a2a30;border-radius:4px;background:rgba(0,229,176,.02);font-size:12px;color:#9a9aa2;line-height:1.7}
.activate-callout h3{font:600 10px/1 'IBM Plex Mono',monospace;letter-spacing:.28em;text-transform:uppercase;color:var(--c);margin-bottom:10px}
.activate-callout ol{margin:0 0 0 18px;padding:0}
.activate-callout li{margin:6px 0;color:#9a9aa2}
.activate-callout b{color:#cccccc;font-weight:600}
.activate-callout code{background:#1a1a1e;color:#bbb;padding:1px 6px;border-radius:2px;font:600 11px/1 'IBM Plex Mono',monospace;letter-spacing:.04em}

.empty{padding:32px;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:4px}
.empty p{color:#7a7a82;font-size:13px;line-height:1.7;margin-bottom:18px}
.empty a{display:inline-block;padding:11px 22px;background:var(--c);color:var(--bg);font:700 11px/1 'IBM Plex Mono',monospace;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;border-radius:2px}
.empty a:hover{box-shadow:0 8px 24px rgba(0,229,176,.2)}

.licenses{display:flex;flex-direction:column;gap:14px}
.lic{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:20px;display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto auto;gap:6px 16px;align-items:start}
.lic.lifetime{border-color:rgba(167,139,250,.35);box-shadow:0 0 0 1px rgba(167,139,250,.1)}
.lic.pro{border-color:rgba(0,229,176,.35);box-shadow:0 0 0 1px rgba(0,229,176,.1)}
.lic-tier{font:700 9px/1 'IBM Plex Mono',monospace;letter-spacing:.22em;text-transform:uppercase;padding:4px 8px;border-radius:2px;width:fit-content;grid-column:1}
.lic-tier.pro{color:var(--c);border:1px solid rgba(0,229,176,.4);background:rgba(0,229,176,.06)}
.lic-tier.lifetime{color:var(--purple);border:1px solid rgba(167,139,250,.4);background:rgba(167,139,250,.06)}
.lic-key{font:700 14px/1.3 'IBM Plex Mono',monospace;color:#eaeaea;letter-spacing:.12em;word-break:break-all;user-select:all;-webkit-user-select:all;grid-column:1}
.lic-meta{font-size:10px;color:#5a5a62;letter-spacing:.04em;line-height:1.6;grid-column:1}
.lic-meta b{color:#9a9aa2;font-weight:600}
.lic-state{grid-column:2;grid-row:1 / span 3;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.lic-state .badge{font:600 9px/1 'IBM Plex Mono',monospace;letter-spacing:.18em;text-transform:uppercase;padding:5px 9px;border-radius:2px;white-space:nowrap}
.lic-state .badge.unredeemed{color:var(--yellow);border:1px solid rgba(245,208,0,.4);background:rgba(245,208,0,.06)}
.lic-state .badge.redeemed{color:#5a5a62;border:1px solid #2a2a30}
.lic-state button{background:none;border:1px solid var(--border);color:#888;padding:6px 12px;font:600 9px/1 'IBM Plex Mono',monospace;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:.2s}
.lic-state button:hover{color:var(--c);border-color:var(--c)}

.loading{padding:40px;text-align:center;color:#666;font-size:12px;letter-spacing:.04em}
.spinner{display:inline-block;width:9px;height:9px;border-radius:50%;background:#666;margin-right:8px;animation:pulse 1.2s ease-in-out infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

.error-banner{margin-top:18px;padding:12px 14px;background:rgba(255,95,95,.06);border:1px solid rgba(255,95,95,.4);border-radius:2px;color:#ff7070;font-size:12px;letter-spacing:.04em;line-height:1.55}

footer{text-align:center;padding:36px 32px;color:#3a3a40;font-size:10px;border-top:1px solid var(--border);letter-spacing:.15em;text-transform:uppercase;margin-top:60px}
footer .foot-links{margin-top:14px;font-size:9px;letter-spacing:.18em}
footer .foot-links a{color:#454550;text-decoration:none;margin:0 4px}
footer .foot-links a:hover{color:var(--c)}
</style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to content</a>
<div class="stripe" role="presentation" aria-hidden="true"></div>
<div class="shell">

<header><nav aria-label="Main navigation">
  <a href="./index.html" class="brand"><img src="icon.png" alt="Antares Logo">ANTARES</a>
  <div class="links"><a href="./pricing.html">Pricing</a><a href="./faq.html">Q&amp;A</a><a href="./install.html">Install</a></div>
</nav></header>

<main id="main-content">
<div id="loading" class="loading"><span class="spinner"></span>Loading your account&hellip;</div>

<div id="account-view" style="display:none">
  <div class="head-row">
    <h1>Your <span>account</span>.</h1>
    <div class="account-meta">
      Logged in as <b id="account-email">&mdash;</b><br>
      <button class="logout-btn" id="logout-btn" type="button">Log out</button>
    </div>
  </div>

  <!-- Tier banner — populated by renderTier() below. The status / expiry
       badge on the right answers "is this still active and until when".
       Free is the default state until at least one license is found. -->
  <div class="tier-banner free" id="tier-banner">
    <div>
      <div class="tier-banner-label">Current tier</div>
      <div class="tier-banner-name" id="tier-name">Free</div>
      <div class="tier-banner-detail" id="tier-detail">50 scans / day &middot; no card on file</div>
    </div>
    <div class="tier-banner-meta" id="tier-meta">
      <b>Live now</b><br>across the extension
    </div>
  </div>

  <!-- Activate-in-extension callout — only rendered when there's at
       least one unredeemed license. Wired up by renderActivateCallout(). -->
  <div id="activate-wrap"></div>

  <div class="section-label" id="results-label" style="display:none"><span>Your licenses</span></div>
  <section class="licenses" id="licenses"></section>
  <div class="error-banner" id="error" style="display:none"></div>
</div>
</main>

</div>
<footer>Antares <div class="foot-links"><a href="./pricing.html">Pricing</a> &middot; <a href="./demo.html">Demo</a> &middot; <a href="./faq.html">Q&amp;A</a> &middot; <a href="./install.html">Install</a> &middot; <a href="./privacy.html">Privacy</a></div></footer>

<script>
(function() {
  var API = 'https://antares-extension.vercel.app';
  var loadingEl = document.getElementById('loading');
  var viewEl = document.getElementById('account-view');
  var emailEl = document.getElementById('account-email');
  var logoutBtn = document.getElementById('logout-btn');
  var resultsLabel = document.getElementById('results-label');
  var listEl = document.getElementById('licenses');
  var errorEl = document.getElementById('error');

  function fmtDate(epochMs) {
    if (!epochMs) return '—';
    try { return new Date(epochMs).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }); }
    catch(_) { return '—'; }
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c];
    });
  }
  function setError(msg) {
    if (msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    } else {
      errorEl.style.display = 'none';
      errorEl.textContent = '';
    }
  }

  // ── Tier resolution ──────────────────────────────────────────────────
  // The extension reads tier from a different key (install_id), but the
  // *license-of-record* — what the user actually paid for — lives on
  // their email. Lifetime trumps Pro trumps Free. Pro is "active" only
  // if it has at least one unexpired license. Once we know the verdict
  // we light up the banner.
  function resolveTier(list) {
    var now = Date.now();
    var hasLifetime = false;
    var activeProExpiry = 0;
    list.forEach(function(l) {
      if (l.tier === 'lifetime') hasLifetime = true;
      else if (l.tier === 'monthly' || l.tier === 'pro') {
        var exp = Number(l.expiresAt) || 0;
        if (exp > now && exp > activeProExpiry) activeProExpiry = exp;
      }
    });
    if (hasLifetime) return { tier: 'lifetime', activeProExpiry: 0 };
    if (activeProExpiry > 0) return { tier: 'pro', activeProExpiry: activeProExpiry };
    return { tier: 'free', activeProExpiry: 0 };
  }

  function renderTier(verdict) {
    var bannerEl = document.getElementById('tier-banner');
    var nameEl = document.getElementById('tier-name');
    var detailEl = document.getElementById('tier-detail');
    var metaEl = document.getElementById('tier-meta');

    bannerEl.classList.remove('free', 'pro', 'lifetime');
    bannerEl.classList.add(verdict.tier);

    if (verdict.tier === 'lifetime') {
      nameEl.textContent = 'Lifetime';
      detailEl.innerHTML = '<b>Every Pro feature, forever.</b> Includes every release we ship from here on out. Paid once, valid for the life of the product.';
      metaEl.innerHTML = '<b>Active</b><br>forever';
    } else if (verdict.tier === 'pro') {
      nameEl.textContent = 'Pro';
      detailEl.innerHTML = '<b>Unlimited scans &middot; full overlay.</b> AI Summary, Critical Flags, Full Analysis page, scan history, priority cache and exports across all 7 supported platforms.';
      metaEl.innerHTML = '<b>Renews</b><br>' + fmtDate(verdict.activeProExpiry);
    } else {
      nameEl.textContent = 'Free';
      detailEl.innerHTML = '<b>50 scans per day &middot; no card on file.</b> The verdict, the score, the overlay across 7 platforms. Pay once on Solana to unlock the full engine.';
      metaEl.innerHTML = '<b>Live now</b><br>across the extension';
    }
  }

  // ── Activate-in-extension callout ─────────────────────────────────────
  // Fires only when there's at least one unredeemed license. The user
  // bought it but hasn't yet pasted the key into their browser
  // extension, so the overlay is still showing Free. This bridges the
  // gap with explicit step-by-step instructions.
  // ── Probe the extension via the content-script bridge ───────────────────
  // The extension drops <meta name="antares-extension-installed"> at
  // document_start AND replies to postMessage queries with the install_id
  // (see contents/antares-website-bridge.ts in the extension repo).
  // We probe once on /account.html load — if the extension is present
  // we offer a one-click "Link to my extension" that auto-redeems the
  // best unredeemed license against the detected install_id. Pasting a
  // key in extension Options becomes optional UX, not the only path.
  function probeExtensionInstallId() {
    return new Promise(function(resolve) {
      var marker = document.querySelector('meta[name="antares-extension-installed"]');
      if (!marker) return resolve(null);
      var nonce = String(Date.now()) + ':' + Math.random().toString(36).slice(2);
      var resolved = false;
      function onMsg(e) {
        if (e.source !== window) return;
        var d = e.data;
        if (!d || typeof d !== 'object' || d.type !== 'antares:install-id-response' || d.nonce !== nonce) return;
        resolved = true;
        window.removeEventListener('message', onMsg);
        resolve(d.install_id || null);
      }
      window.addEventListener('message', onMsg);
      window.postMessage({ type: 'antares:get-install-id', nonce: nonce }, window.location.origin);
      setTimeout(function() {
        if (!resolved) { window.removeEventListener('message', onMsg); resolve(null); }
      }, 800);
    });
  }

  // Pick the "best" license to auto-link. Lifetime trumps Pro; among
  // multiples of the same tier we pick the most recent. Skip already-
  // redeemed licenses — re-redeeming them would be a no-op at best, an
  // "already_redeemed" error at worst when the buyer's earlier install
  // owns it.
  function pickBestUnredeemed(list) {
    var unredeemed = list.filter(function(l) { return !l.redeemed; });
    if (!unredeemed.length) return null;
    var lifetime = unredeemed.filter(function(l) { return l.tier === 'lifetime'; });
    var pool = lifetime.length ? lifetime : unredeemed;
    // Most recent first
    pool.sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
    return pool[0];
  }

  // Server-side redeem call. Same endpoint extension uses — keeps the
  // accounting consistent regardless of whether the user pasted a key
  // manually or clicked the auto-link button here.
  function autoRedeemLicense(license, installId) {
    return fetch(API + '/api/redeem', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ license_key: license.key, install_id: installId })
    }).then(function(r) {
      return r.json().then(function(b) { return { status: r.status, body: b }; });
    });
  }

  function renderActivateCallout(list) {
    var wrap = document.getElementById('activate-wrap');
    var unredeemed = list.filter(function(l) { return !l.redeemed; });
    if (!unredeemed.length) { wrap.innerHTML = ''; return; }
    var keyPreview = unredeemed[0].key;

    // Default state — paste-key instructions (fallback when no extension
    // detected, or as instructions even when the auto-link button is
    // shown so users on a different install can still redeem manually).
    var fallbackHtml =
      '<h3>&rarr; Activate in your browser extension</h3>' +
      'You have <b>' + unredeemed.length + ' unredeemed license' + (unredeemed.length > 1 ? 's' : '') + '</b>. ' +
      'To unlock Pro features in your overlay:' +
      '<ol>' +
        '<li>Click your <b>Antares extension icon</b> in the browser toolbar &rarr; <b>Options</b>.</li>' +
        '<li>Find the <code>Redeem a Pro license</code> field.</li>' +
        '<li>Paste your license key (e.g. <code>' + escapeHtml(keyPreview) + '</code>) and click <b>Redeem</b>.</li>' +
        '<li>The overlay flips to your tier instantly &mdash; refresh any open token page to see it.</li>' +
      '</ol>';

    wrap.innerHTML = '<div class="activate-callout" id="activate-callout">' + fallbackHtml + '</div>';

    // Try to upgrade to a one-click auto-link if the extension is here.
    probeExtensionInstallId().then(function(installId) {
      if (!installId) return; // no extension detected — keep the paste-key fallback
      var best = pickBestUnredeemed(list);
      if (!best) return;

      var calloutEl = document.getElementById('activate-callout');
      if (!calloutEl) return;
      calloutEl.innerHTML =
        '<h3>&check; Antares extension detected</h3>' +
        'We found your installed extension. Click below to auto-redeem your ' +
        '<b>' + (best.tier === 'lifetime' ? 'Lifetime' : 'Pro') + '</b> license to it &mdash; no copying or pasting required.' +
        '<div style="margin-top:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">' +
          '<button type="button" id="auto-link-btn" style="background:var(--c);color:var(--bg);border:none;padding:11px 22px;font:700 11px/1 \'IBM Plex Mono\',monospace;letter-spacing:.18em;text-transform:uppercase;border-radius:2px;cursor:pointer">Link to my extension &rarr;</button>' +
          '<span id="auto-link-status" style="font-size:11px;color:#7a7a82;letter-spacing:.04em"></span>' +
        '</div>' +
        '<details style="margin-top:14px"><summary style="cursor:pointer;font-size:11px;color:#5a5a62;letter-spacing:.18em;text-transform:uppercase">Or paste the key manually</summary><div style="margin-top:10px">' +
        fallbackHtml.replace(/^<h3>[^<]+<\/h3>/, '') +
        '</div></details>';

      var btn = document.getElementById('auto-link-btn');
      var status = document.getElementById('auto-link-status');
      btn.addEventListener('click', function() {
        btn.disabled = true;
        btn.style.opacity = '0.6';
        status.textContent = 'Linking…';
        autoRedeemLicense(best, installId).then(function(r) {
          if (r.status === 200 && r.body && r.body.ok) {
            status.innerHTML = '<span style="color:var(--c)">&check; Linked. Refresh any token page to see your tier.</span>';
            btn.style.display = 'none';
          } else if (r.body && r.body.reason === 'already_redeemed') {
            status.innerHTML = '<span style="color:var(--c)">&check; Already linked to this extension.</span>';
            btn.style.display = 'none';
          } else {
            var msg = (r.body && r.body.reason) || 'Redeem failed.';
            status.innerHTML = '<span style="color:#ff7777">&times; ' + escapeHtml(msg) + '</span>';
            btn.disabled = false;
            btn.style.opacity = '1';
          }
        }).catch(function() {
          status.innerHTML = '<span style="color:#ff7777">&times; Network error. Try again.</span>';
          btn.disabled = false;
          btn.style.opacity = '1';
        });
      });
    });
  }

  function renderLicenses(list) {
    // Resolve + paint the tier banner first — that's the answer the
    // user came here for, even before they look at the licence rows.
    var verdict = resolveTier(list);
    renderTier(verdict);
    renderActivateCallout(list);

    if (!list.length) {
      listEl.innerHTML = '<div class="empty"><p>You don\'t have any licenses yet. Pick a tier and pay direct on Solana &mdash; your license arrives within a minute of on-chain confirmation.</p><a href="./pricing.html">View pricing</a></div>';
      return;
    }
    resultsLabel.style.display = 'block';
    listEl.innerHTML = list.map(function(l) {
      var tierLabel = l.tier === 'lifetime' ? 'Lifetime' : 'Pro · 30 days';
      var stateBadge = l.redeemed
        ? '<span class="badge redeemed">Redeemed</span>'
        : '<span class="badge unredeemed">Unredeemed</span>';
      var expiryLine = l.tier === 'lifetime' ? '<b>Expires:</b> never'
        : '<b>Expires:</b> ' + fmtDate(l.expiresAt);
      return [
        '<div class="lic ' + l.tier + '">',
          '<div class="lic-tier ' + l.tier + '">' + tierLabel + '</div>',
          '<div class="lic-key" id="key-' + escapeHtml(l.key) + '">' + escapeHtml(l.key) + '</div>',
          '<div class="lic-meta"><b>Issued:</b> ' + fmtDate(l.createdAt) + ' &middot; ',
            '<b>Paid:</b> $' + Number(l.amountUsd || 0).toFixed(2) + ' &middot; ',
            expiryLine,
            (l.redeemed ? ' &middot; <b>Redeemed:</b> ' + fmtDate(l.redeemedAt) : ''),
          '</div>',
          '<div class="lic-state">',
            stateBadge,
            '<button type="button" data-key="' + escapeHtml(l.key) + '">Copy key</button>',
          '</div>',
        '</div>'
      ].join('');
    }).join('');
    listEl.querySelectorAll('.lic-state button').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var key = btn.getAttribute('data-key');
        if (!key) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(key).then(function() {
            var orig = btn.textContent;
            btn.textContent = '✓ Copied';
            setTimeout(function() { btn.textContent = orig; }, 1800);
          });
        }
      });
    });
  }

  // 1. Check session
  fetch(API + '/api/auth/me', { credentials: 'include' })
    .then(function(r) {
      if (r.status === 401) {
        // Not authenticated — bounce to /auth with return URL
        window.location.href = './auth.html?return=' + encodeURIComponent('./account.html');
        return null;
      }
      return r.json();
    })
    .then(function(body) {
      if (!body) return;
      if (!body.ok) {
        loadingEl.textContent = 'Could not load account.';
        return;
      }
      emailEl.textContent = body.email;
      loadingEl.style.display = 'none';
      viewEl.style.display = 'block';

      // 2. Fetch licenses (session cookie auths the call)
      return fetch(API + '/api/account-licenses', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({}) // no body needed when session cookie is present
      })
        .then(function(r) { return r.json().then(function(b) { return { status: r.status, body: b }; }); })
        .then(function(r) {
          if (r.status !== 200 || !r.body || !r.body.ok) {
            setError('Could not load your licenses. Please retry.');
            return;
          }
          renderLicenses(r.body.licenses || []);
        });
    })
    .catch(function() {
      loadingEl.textContent = 'Network error. Reload?';
    });

  // 3. Logout
  logoutBtn.addEventListener('click', function() {
    fetch(API + '/api/auth/logout', { method: 'POST', credentials: 'include' })
      .then(function() {
        try { localStorage.removeItem('antares_buyer_email'); } catch(_) {}
        window.location.href = './auth.html';
      })
      .catch(function() {
        window.location.href = './auth.html';
      });
  });
})();
</script>
</body>
</html>
